<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Rashmi ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <h1 id="message">රශ්මි... ❤️</h1>
</div>

<div id="question" class="hidden">

  <h1>සුදූ... 🥺💕</h1>

  <h2>ඔයාට කවද්ද මාව හමු වෙන්න පුළුවන්? 🌸</h2>

  <form id="meetForm">

    <label>📅 දිනය</label>
    <input type="date" id="date" required>

    <label>⏰ වෙලාව</label>
    <input type="time" id="time" required>

    <label>💌 අදහස</label>
    <textarea id="thought" rows="5" placeholder="මට කියන්නකෝ ❤️"></textarea>

    <button type="submit">මට එවන්න 💕</button>

  </form>

</div>

<script src="script.js"></script>

</body>
</html>
