<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Rashmi ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <h1 id="message">💖 රශ්මි...</h1>
  <p class="sub">loading feelings...</p>
</div>

<div id="question" class="hidden">

  <div class="card">

    <h1>🥺 සුදූ...</h1>

    <p class="sub2">
      මට ඔයාව හමුවෙන්න ආසයි ❤️
    </p>

    <form id="meetForm">

      <div class="box">
        <label>📅 දිනය</label>
        <input type="date" id="date" required>
      </div>

      <div class="box">
        <label>⏰ වෙලාව</label>
        <input type="time" id="time" required>
      </div>

      <div class="box">
        <label>💌 අදහස</label>
        <textarea id="thought" rows="4" placeholder="මට කියන්නකෝ ❤️"></textarea>
      </div>

      <button type="submit">Send 💕</button>

    </form>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
